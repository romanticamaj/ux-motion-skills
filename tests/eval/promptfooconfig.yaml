description: ux-motion-skills behavioral eval (baseline vs treatment)

prompts:
  - "{{prompt}}"

# `file://` paths resolve relative to THIS config file (tests/eval/).
# `configDir` is consumed by the provider and resolved against the process cwd,
# so run Promptfoo from the repo root (run.js does this). Keep it repo-relative.
providers:
  - id: file://providers/claude-code.cjs
    label: baseline
    config:
      configDir: tests/eval/fixtures/config-baseline
  - id: file://providers/claude-code.cjs
    label: treatment
    config:
      configDir: tests/eval/fixtures/config-with-skills

# Grade llm-rubric assertions through the same headless Claude Code path (works with
# subscription auth — no ANTHROPIC_API_KEY needed). To use the Anthropic API instead,
# set ANTHROPIC_API_KEY and replace this with `provider: anthropic:messages:claude-opus-4-8`.
defaultTest:
  options:
    provider:
      id: file://providers/claude-code.cjs
      config:
        configDir: tests/eval/fixtures/config-baseline

tests:
  - file://corpus/web-ux-motion.yaml
  - file://corpus/app-ux-motion.yaml
  - file://corpus/interaction-patterns.yaml
  - file://corpus/designer-handoff.yaml
  - file://corpus/motion-principles.yaml
