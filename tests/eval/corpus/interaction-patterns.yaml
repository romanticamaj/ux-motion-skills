# Adversarial: baseline tends to give generic "update state" / a spinner.
- vars:
    prompt: "My like button waits for the server response before the heart fills. Make it feel instant. Short React snippet."
  assert:
    - { type: icontains, value: "useOptimistic" }
    - type: llm-rubric
      value: "Updates optimistically the same frame with a rollback path (useOptimistic or TanStack onMutate snapshot), and coalesces rapid toggles; does not await the server before updating the UI."
- vars:
    prompt: "Add a loading state to this feed while it fetches."
  assert:
    - { type: icontains, value: "skeleton" }
    - { type: icontains, value: "aspect-ratio" }
    - type: llm-rubric
      value: "Recommends a layout-accurate skeleton that reserves space (aspect-ratio) rather than a centered spinner; mentions a flash-guard (>~180ms to show, ~300-500ms min) and keepPreviousData on refetch."
