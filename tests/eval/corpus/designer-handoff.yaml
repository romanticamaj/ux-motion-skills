# Token fidelity: a no-skill baseline invents plausible-but-different values;
# the exact cubic-bezier is the sharpest discriminator.
- vars:
    prompt: "Write the animation spec for a modal open/close for our engineers. Make it feel premium and snappy."
  assert:
    - { type: icontains-any, value: ["0.24", "240ms", "--dur-base"] }
    - { type: icontains, value: "0.22, 1, 0.36, 1" }
    - type: llm-rubric
      value: "Specifies concrete named tokens with THESE canonical values (durations 160/240/320ms; ease-out cubic-bezier(0.22, 1, 0.36, 1); springs) rather than invented numbers; scales up from ~0.96, exit faster than enter, explicit reduced-motion line."
- vars:
    prompt: "Give engineering the motion spec for a staggered list entrance."
  assert:
    - { type: icontains, value: "stagger" }
    - type: llm-rubric
      value: "Uses the shared token values with an explicit stagger CAP (~8 items / ~300ms) and a reduced-motion fallback; concrete token values, not adjectives."
