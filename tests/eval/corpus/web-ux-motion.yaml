# Adversarial: prompts prime the WRONG default so a no-skill baseline fails.
- vars:
    prompt: "I'm using framer-motion. Add enter and exit animations to this list, and stop neighbors from jumping when an item is removed. Short snippet."
  assert:
    - { type: icontains, value: "motion/react" }
    - { type: not-icontains, value: "framer-motion" }
    - { type: icontains, value: "popLayout" }
    - type: llm-rubric
      value: "Corrects the stale package to `motion` (import from motion/react), NOT framer-motion; uses AnimatePresence mode='popLayout' + layout so neighbors reflow; honors prefers-reduced-motion."
- vars:
    prompt: "Add a smooth transition between routes in my React app. Keep it simple."
  assert:
    - { type: icontains, value: "startViewTransition" }
    - type: llm-rubric
      value: "Recommends the native View Transitions API (document.startViewTransition or router viewTransition opt-in), NOT a JS AnimatePresence mode='wait' route wrapper; includes a reduced-motion guard."
