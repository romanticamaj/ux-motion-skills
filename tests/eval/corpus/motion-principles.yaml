# Token fidelity: asking for the EXACT curve exposes whether the answer matches
# the pack's canonical value or is a plausible invention.
- vars:
    prompt: "In one line: the exact duration (ms) and easing cubic-bezier for a modal ENTER."
  assert:
    - { type: icontains, value: "0.22, 1, 0.36, 1" }
    - type: llm-rubric
      value: "Gives ~240ms and the ease-out cubic-bezier(0.22, 1, 0.36, 1) for the enter; not a generic ease-in-out or a made-up curve."
- vars:
    prompt: "One line each: enter easing vs exit easing, and which should be faster."
  assert:
    - type: llm-rubric
      value: "Enter = ease-out (decelerate), exit = ease-in (accelerate) and ~30% faster; matches the pack's direction-carries-meaning rule."
