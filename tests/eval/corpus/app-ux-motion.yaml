# Adversarial: baseline tends to reach for RN-core LayoutAnimation / hand-rolled timing.
- vars:
    prompt: "My React Native list pops when I add or remove rows. Make the rows animate smoothly. Short snippet."
  assert:
    - { type: icontains, value: "LinearTransition" }
    - type: llm-rubric
      value: "Uses Reanimated layout animations (LinearTransition + entering/exiting), NOT RN-core LayoutAnimation or manual Animated.timing; honors useReducedMotion; exit faster than enter."
- vars:
    prompt: "My bottom sheet snaps open instantly. Make it settle smoothly instead. Short snippet."
  assert:
    - { type: icontains, value: "bottom-sheet" }
    - type: llm-rubric
      value: "Recommends @gorhom/bottom-sheet v5 with spring animationConfigs and GestureHandlerRootView; not a hand-rolled Animated.timing snap."
